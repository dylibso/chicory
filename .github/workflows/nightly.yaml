name: Nightly Fuzz

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight
  workflow_dispatch: # allow manual triggering

permissions:
  pull-requests: write

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Fuzz Test
        if: github.repository_owner == 'dylibso'
        run: |
          # Build everything
          mvn -B -Dquickly
          # Run differential fuzz tests (interpreter vs compiler)
          mvn -B verify -pl fuzz -DskipTests=false -Dfuzz.test.iterations=50

      - name: Copy crash reproducers to source tree
        if: failure()
        run: |
          if [ -d fuzz/target/crash-reproducers ]; then
            cp -r fuzz/target/crash-reproducers/crash-* fuzz/src/test/resources/ 2>/dev/null || true
          fi

      - name: Create Pull Request with the crash repro
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        if: failure()
        with:
          token: ${{secrets.GH_TOKEN}}
          commit-message: Nightly crash
          committer: Chicory BOT <chicory@dylibso.com>
          author: Chicory BOT <chicory@dylibso.com>
          signoff: false
          branch: fuzz-crash-repro
          branch-suffix: random
          delete-branch: true
          title: '[FUZZ] Crash reproducer'
          body: Fuzz testing failed and there are new reproducers available.
          draft: false
