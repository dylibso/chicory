name: Nightly Fuzz

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight
  workflow_dispatch: # allow manual triggering

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Fuzz Test
        if: github.repository_owner == 'dylibso'
        run: |
          # Build everything
          mvn -B -Dquickly
          # Run differential fuzz tests (interpreter vs compiler)
          mvn -B verify -pl fuzz -DskipTests=false -Dfuzz.test.iterations=50

      - name: Upload crash reproducers
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-crash-reproducers
          path: fuzz/target/crash-reproducers/
          retention-days: 90
          if-no-files-found: ignore
